<!doctype html>
{% load static %}
{% load i18n %}
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <!-- Bootstrap CSS & JS & Icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'app/css/base_template.css' %}">
    {% block extra_css %}{% endblock %}

</head>
<body>
<nav class="menu">
    <ul class="left">
        <li class="{% if request.path == '/' %}active{% endif %}">
            <a href="/">{% trans "Main" %}</a>
        </li>
        <li class="{% if request.path == '/about/' %}active{% endif %}">
            <a href="/about/">{% trans "About me" %}</a>
        </li>
        <li class="{% if request.path == '/projects/' %}active{% endif %}">
            <a href="/projects/">{% trans "My projects" %}</a>
        </li>
        <li class="{% if request.path == '/contact/' %}active{% endif %}">
            <a href="/contact/">{% trans "Contact me" %}</a>
        </li>
    </ul>

    <ul class="right">
        <li class="light-dark-mode">
            <a href="#" id="theme-toggle">
                <i id="icon-moon" class="bi bi-moon-fill"></i>
                <i id="icon-sun" class="bi bi-sun-fill" style="display: none;"></i>
            </a>
        </li>


    </ul>
</nav>

<div class="page-wrapper">
    {% block content %}
    {% endblock %}
</div>
<canvas id="matrix-overlay" aria-hidden="true"></canvas>

<script src="{% static 'app/theme.js' %}"></script>
<script src="{% static 'app/js/glitch_timer.js' %}"></script>
<script src="{% static 'app/js/matrix_transition.js' %}"></script>
</body>
</html>
